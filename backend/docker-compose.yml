services:
  api:
    build: .
    container_name: casetodo-carlos-ruiz-api
    env_file:
      - .env
    ports:
      - "${PORT:-3100}:${PORT:-3100}"
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: casetodo-carlos-ruiz-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-2755}:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
